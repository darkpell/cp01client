name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: ESLint 검사
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 패키지 설치
        run: npm ci

      - name: ESLint 실행
        run: npm run lint

  typecheck:
    name: TypeScript 타입 검사
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 패키지 설치
        run: npm ci

      - name: vue-tsc 타입 검사
        run: npx vue-tsc --noEmit

  claude-md-check:
    name: CLAUDE.md 품질 검사 (cclint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: cclint 실행
        run: npx cclint CLAUDE.md
        continue-on-error: true

  build:
    name: 빌드 검증
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 패키지 설치
        run: npm ci

      - name: Quasar 빌드
        run: npm run build
